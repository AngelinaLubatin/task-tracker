<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotodo — Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <div class="page-wrapper">

        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <a href="#" class="logo-text">Dotodo</a>
                <div class="auth-buttons">
                    <!-- Ссылка на страницу входа -->
                    <a href="{{ url_for('login') }}" class="btn btn-outline">Войти</a>
                    <!-- Ссылка на страницу регистрации -->
                    <a href="{{ url_for('register') }}" class="btn btn-primary">Регистрация</a>
                </div>
            </div>
        </header>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="auth-container">
            <div class="auth-card">

                <!-- ЗАГОЛОВОК -->
                <h2 class="auth-welcome">Создать аккаунт</h2>

                <!-- Табы: теперь это ссылки -->
                <div class="auth-tabs">
                    <!-- Ссылка на страницу входа -->
                    <a href="{{ url_for('login') }}" class="tab-btn">Вход</a>
                    <!-- Ссылка на текущую страницу (Регистрация) -->
                    <a href="{{ url_for('register') }}" class="tab-btn active">Регистрация</a>
                </div>

                <!-- Форма регистрации -->
                <form class="auth-form" method="POST" action="/register">
                    <div class="form-group">
                        <label for="name">Имя</label>
                        <input type="text" id="name" name="name" placeholder="Наталья" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Почта</label>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Подтвердите пароль</label>
                        <input type="password" id="confirm-password" name="confirm_password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary auth-submit">Зарегистрироваться</button>
                </form>

                <p class="auth-footer">
                    Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
                </p>

            </div>
        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-left">
                    <a href="#" class="logo-text">Dotodo</a>
                    <p class="copyright">© 2026 Dotodo. Все права защищены.</p>
                </div>
                <div class="footer-right">
                    <a href="#" class="footer-link">Политика конфиденциальности</a>
                    <a href="#" class="footer-link">Условия использования</a>
                </div>
            </div>
        </footer>

    </div>
    <script src="{{ url_for('static', filename='charts.js') }}"></script>
</body>
</html>
